title: "적게 일하고 많이 벌자!"
description: "적게 일하고 많이 벌자!"
url: "https://cmh9101.github.io"
baseurl: ""

remote_theme: "mmistakes/minimal-mistakes@4.28.0"

plugins:
  - jekyll-include-cache

locale: "ko-KR"

author:
  name: "cmh9101"
  avatar: "/assets/images/free.png"
  bio: "자동사냥을 위하여"
  location: "Seoul, Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/cmh9101"

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      image: "/assets/images/fee.png"
      sidebar:
        nav: "paper-sidebar"
      read_time: true
      comments: false
      share: true
      related: true

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/
